body:
  text: 唐風集卷三唐杜荀鶴撰今體五言七言絶句凡五十二首感寓大海波濤淺小人方寸深海枯終見底人死不知心春閨怨朝喜花艷春暮悲花委塵不悲花落早悲妾似花身馬上行五里復五里去時無住時日將家漸逺猶恨馬行遲釣叟茅屋深灣裏釣船橫竹門經營衣食外猶見弄兒孫再經胡城縣去歲曾經此縣城縣民無口不寃聲今來縣宰加朱紱便是生靈血染成讀諸家詩辭賦文章能者稀難中難者莫過詩直應吟骨無生死秖我前身是阿誰春來燕我屋汝嫌低不住雕梁畫閣也知寬大須穩擇安巢處莫道巢成却不安清溪來明府出二子清詩因遺一絶珠明玉潤盡驚人不稱寒門不稱貧若向吾唐作雙瑞便同祥鳳與祥麟哭陳陶耒陽山下傷工部採石江邊弔翰林兩地荒墳各三尺却成開解哭君心哭貝韜交朋來哭我來歌喜傍山家葬荔蘿四海十年人殺盡似君埋少不埋多蠶婦粉色全無飢色加豈知人世有榮華年年道我蠶辛苦底事渾身著苧麻山寺老僧草屐無塵心地間靜隨猿鳥過寒暄眼昏齒落看經遍却向僧中總不言閩中秋思雨勻紫菊叢叢色風弄紅蕉葉葉聲北畔是山南畔海秖堪圖畫不堪行八駿圖丹艧傳真未得真那知筋骨與精神秖今恃駿憑毛色緑耳驊騮賺殺人贈僧利門名路兩何憑百歲風前短焰燈秖恐為僧僧不了為僧得了總輸僧秋夕世間多少能詩客誰是無愁得睡人自我夜來霜月下到頭吟魄始終身溪興山雨溪風卷釣絲瓦甌蓬底獨斟時醉來睡著無人喚流下前溪也不知過巢湖世人貪利復貪榮來向湖邊始至誠男子登舟與登陸把心何不一般行傷硤石縣病叟無子無孫一病翁將何筋力事耕農官家不管蓬蒿地須勒王租出此中贈老僧童子為僧今白首暗鋤心地種間情時將舊衲添新線披坐披行過一生釣叟田不曾耕地不鋤誰人間散得如渠渠將底物為香餌一度擡竿一箇漁溪岸秋思桑柘窮頭三四家挂罾垂釣是生涯秋風忽起溪灘白零落岸邊蘆荻花春日旅寓滿城羅綺拖春色幾處笙歌揭畫樓江上有家歸未得眼前花是眼前愁田翁白髮星星筋力衰種田猶自伴孫兒官苗若不平平納任是豐年也受飢秋江雨夜逢詩友故友别來三四載新詩吟得百餘篇夜來江上秋無月恨不相逢在雪天感春無況青雲有恨身眼前花似夢中春浮生七十今三十巳是人間半世人題花木障不假東風次第吹筆勻春色一枝枝由來畫看勝栽看免見朝開暮落時顧雲侍御出二子請詩因遺一絶二雛毛骨秀仍竒小小能吟大大詩想得月中仙桂樹各從生日長新枝秋夕病中壞屋不眠風雨夜故園無信水雲秋病中枕上誰相問一一蟬聲槐樹頭宿欒城驛却寄常山張書記一更更盡到三更吟破離心句不成數樹秋風滿庭月憶君時復下階行湘江秋夕三湘月色三湘水浸骨寒光似練鋪一夜塞鴻來不住故鄉書信半年無旅懷蒹葭月冷時聞鴈楊栁風和日聽鶯水涉山行二年客就中偏怕雨船聲贈崔道士四海兵戈無靜處人家廢業望烽煙九華道士渾如夢猶向尊前笑揭天題道林寺身未立間終日苦身當立後幾年榮萬般不及僧無事共水將山過一生贈質上人枿坐雲遊出世塵兼無瓶鉢可隨身逢人不説人間事便是人間無事人涇溪涇溪石險人兢慎終歲不聞傾覆人却是平流無石處時時聞説有沈淪夏日題悟空上人院三伏閉門披一衲兼無松竹蔭房廊安禪不必須山水滅得心中火自涼經嚴陵釣臺蒼翠雲峯開俗眼泓澄煙水浸塵心唯將道業為芳餌釣得高名直至今關試後筵上别同人日午離筵到夕陽明朝秦地與吳鄉同年多是長安客不信行人欲斷腸鸕鷀一般毛羽結羣飛雨岸煙汀好景時深水有魚銜得出看來却是鷺鷥飢宿村舍野人於我有何情半掩柴門向月明深夜欲眠眠未著一叢寒木一猿聲題新鴈暮天新鴈起汀洲紅蓼花疏水國秋想得故園今夜月幾人相憶在江樓離家丈夫三十身如此疲馬離鄉懶著鞭槐栁路長愁殺我一枝蟬到一枝蟬旅舍遇雨月華星彩坐來收嶽色江聲暗結愁半夜燈前十年事一時和雨到心頭送人歸淝上巢湖春漲喻溪深才過東關見故林莫道南來總無利水亭山寺二年吟自遣糲食粗衣隨分過堆金積帛欲如何百年身後一丘土貧富高低爭幾多聞子規楚天空濶月成輪蜀魄聲聲似告人啼得血流無用處不如緘口過殘春秋夜苦吟吟盡三更未著題竹風松雨共凄凄此時若有人來聽始覺巴猿不解啼秋夜聞砧荒涼客舍眠秋色砧杵家家弄月明不及巴山聽猿夜三聲中有不愁聲將過湖南經馬當山廟因書三絶人説馬當波浪險我經波浪似通衢大凡君子行藏是自有龍神衛過湖貪殘官吏虔誠謁毒害商人瀝膽過秖怕馬當山下水不知平地有風波九江連海一般深未必船經廟下沈頭上蒼蒼沒瞞處不如平取一生心唐風集卷三
