body:
  text: 唐風集卷二唐杜荀鶴撰今體七言凡一百四十首冬末同友人泛瀟湘殘臘泛舟何處好最多吟興是瀟湘就船買得魚偏美踏雪沽來酒倍香猿到夜深啼嶽麓鴈知春近别衡陽與君剩採江山景裁取新詩入帝鄉贈李鐔鐔自維楊遇亂東入中山君行君文天合知見君如此我興悲秖殘三口兵戈後才到孤村雨雪時著卧衣裳難辦洗旋求糧食莫供炊地爐不暖柴枝濕猶把蒙求授小兒旅中卧病秋來誰料病相縈枕上心猶算去程風射破窗燈易滅月穿疏屋夢難成故園何啻三千里新鴈才聞一兩聲我自與人無舊分非干人與我無情旅泊遇郡中叛亂示同志握手相看誰敢言軍家刀劒在腰邊遍搜寶貨無藏處亂殺平人不怕天古寺拆為修寨木荒墳開作甃城磚郡侯逐出渾間事正是鑾輿幸蜀年贈秋浦張明府君為秋浦三年宰萬慮關心兩鬢知人事旋生當路縣吏才難展用兵時農夫背上題軍號賈客船頭插戰旗他日親知問官況但教吟取杜家詩雪風攪長空寒骨生光於曉色報窗明江湖不見飛禽影巖谷惟聞折竹聲巢穴幾多相似處路歧兼得一般平擁袍公子休一作莫言冷中有樵夫跣足行題廬嶽劉處士草堂仙境間尋採藥翁草堂留話一宵同若看山下雲深處直是人間路不通泉領藕花來洞口月將松影過溪東求名心在間難遂明日馬蹄塵土中山中寄詩友山深長恨少同人覽景無時不憶君庭果自從霜後熟野猿頻向屋邊聞琴臨秋水彈明月酒就東山酌白雲仙桂算攀攀合得平生心力盡於文秋宿臨江驛南來北去二三年年去年來兩鬢斑舉世盡從愁裏老誰人肻向死前間漁舟火影寒歸浦驛路鈴聲夜過山身事未成歸未得聽猿鞭馬入長關題瓦棺寺真上人院矮檜天生仙檜是長材栽檜希逢此最低一自舊山來砌畔幾畨凡木與雲齊迥無斜影教僧踏免有間枝引鶴棲今日偶題題似著不知題後更誰題江下初秋寓泊濛濛煙雨蔽江村江館愁人好斷魂自别家來生白髮為侵星起謁朱門也知栁欲開春眼爭奈萍無入土根兄弟無書鴈歸北一聲聲覺苦於猿投從叔補闕吾宗不謁謁詩宗常仰門風繼國風空有篇章傳海內更無親族在朝中其來雖愧源流淺所得須憐雅頌同三十年吟到今日不妨私薦亦成公贈張員外兒張公一子才三歲聞客吟聲便出來喚物舌頭猶未穩誦詩心孔迥然開天生便是成家慶年長終為間世才月裏桂枝知有分不勞諸丈作梯媒重陽日有作一為重陽上古臺亂時誰見菊花開偷摰白髮真堪笑牢鎖黃金實可哀是箇少年皆老去爭知荒冢不榮來大家拍手高聲唱日未沈山且莫回入關寄九華友人坐牀難穩露蟬新便作東西馬上身醲酒却輸耽睡客好山翻對不吟人無多志氣禁離别強半年光屬苦辛篋裏篇章頭上雪未知誰戀杏園春送李鐔遊新安邯鄲李鐔才崢嶸酒狂詩逸難干名氣直不與兒一作時輩洽醉來擬共天公爭孤店夜燒枯葉坐亂時秋踏早霜行一間茅屋住不穩剛出為人平不平冬末自長沙遊桂嶺留獻所知家隔重湖歸未期更堪南去别深知前程笑到山多處上馬愁逢歲盡時四海內無容足地一生中有苦心詩朱門秖見朱門事獨把孤寒問阿誰送福昌周繇少府歸寧兼謀隱少見古人無逺慮如君真得古人情登科作尉官雖小避世安親祿巳榮一路水雲生隱思幾山猿鳥認吟聲知君未作終焉計要著文章待太平賀顧雲侍御府主與子弟奏官敕下時年七歲青桂朱袍不賀兄賀兄榮是見兒榮孝經始向堂前徹官誥當從幕下迎戲把藍袍包果子嬌將竹笏惱先生自慚亂世無知已弟姪鞭牛傍隴耕舟行即事年少髭鬚雪欲侵别家三日幾般心朝隨賈客憂風色夜逐漁翁宿葦林秋水鷺飛紅蓼晚暮山猿叫白雲深重陽酒熟茱萸紫却向江頭倚棹吟亂後山居從亂移家擬傍山今來方辦買山錢九州有路休為客百歲無愁即是仙野叟並田鋤暮雨溪禽同石立寒煙他人似我還應少如此安貧亦荷天山居寄同志茅齋深僻絶輪蹄門徑緣莎細接溪垂釣石臺依竹壘待賔茶竈就巖泥風生谷口猿相叫月照松頭鶴並棲不是無端過時日擬從窗下躡雲梯將入關安陸遇兵寇家貧無計早離家離得家來蹇滯多巳是數程行雨雪更堪中路阻兵戈幾州戶口看成血一旦天心却許和四面煙塵少無處不知吾土自如何夏日登友人書齋林亭暑天長似秋天冷帶郭林亭盡不如蟬噪檻前遮日竹鷺窺池面弄萍魚拋山野客橫琴醉種藥家僮踏雪鋤衆惜君才堪上第莫因居此與名疏寄臨海姚中丞夏辭旌斾巳秋深永夕思量淚滿襟風月易斑搜句鬢星霜難改感恩心尋花洞裏連春醉望海樓中徹曉吟雖有夢魂知處所去來多被角聲侵秋日間居寄先達到頭身事欲何為窗下工夫鬢上知乍可百年無稱意難教一日不吟詩風驅早鴈衝湖色雨挫殘蟬點栁枝自古書生也如此獨堪惆悵是明時題覺禪和少見修行得似師茅堂佛像亦隨時禪衣衲後雲藏線夏臘高來雪印眉耕地誡侵連冢土伐薪教護帶巢枝有時問著經中事却道山僧總不知感秋年年名路謾辛勤襟袖空多馬上塵畫戟門前難作客釣魚船上易安身冷煙粘栁蟬聲老寒渚澄星鴈叫新自是儂家無住處不關天地窄於人題德玄上人院刳得心來忙處間間中方寸濶於天浮生自是無空性長壽何曾有百年罷定磬敲松罅月解眠茶煮石根泉我雖未似師披衲此理同師悟了然春日山居寄友人野吟何處最相宜春景暄和好入詩高下麥苗新雨後淺深山色晚晴時半巖雲腳風牽斷平野花枝鳥踏垂倒載干戈是何日近來麋鹿欲相隨懷廬嶽舊隱一别三年長在夢夢中時躡石稜層泉聲入夜方堪聽山色逢秋始好登巖鹿慣隨鋤藥叟溪鷗不怕洗苔僧人間有許多般事求要身間直未能投長沙裴侍郎此身雖賤道長存非謁朱門謁孔門秖望至公將卷讀不求朝士致書論垂綸雨結漁鄉思吹木風傳鴈夜魂男子受恩須有地平生不受等間恩和友人見題山居避時多喜葺居成七字君題萬象清開户曉雲連地白訪人秋月滿山明庭前樹瘦霜來影洞口泉噴雨後聲有景供吟且如此算來何必躁於名獻長沙王侍郎文星漸見射台星皆仰為霖沃衆情天澤逼來逢聖主辭林盛去得書生雲粧嶽色供吟景月浩湘流遞政聲美化事多難諷誦未如耕釣口分明春日登樓遇雨忽地晴天作雨天全無暑氣似秋間看看水沒來時路漸漸雲藏望處山風趂鷺鷥雙出葦浪催漁父盡歸灣一心準擬間登眺却被詩情使不間春日行次錢塘却寄台州姚中丞豈謂無心求上第難安帝里為家貧江南江北間為客潮去潮來却老人兩岸雨收鶯語栁一樓風滿角吹春花前不獨垂鄉淚曾是朱門寄食身投江上崔尚書此生何路出塵埃猶把中才謁上才閉戶十年專筆硯仰天無處認梯媒馬前霜葉催歸去枕上邊鴻喚覺來若許登門換鬐鬛必應辛苦事風雷書事投所知古陌寒風來去吹馬蹄塵旋上麻衣雖然干祿無休意爭奈趨時不見機詩思趂雲從嶽涌鄉心隨鴈繞湖飛肯將骨肉輕離别未遇人知未得歸秋日湖外書事十五年來筆硯功秖今猶在苦貧中三秋客路湖光外萬里鄉關楚邑東鳥徑杖藜山翳雨猿林敧枕樹搖風朱門處處若相似此命到頭通不通邑一作色題宗上人舊院此院重來事事乖半敧茅屋草侵階啄生鴉憶啼松枿接果猿思嘯石崖壁上塵粘蒲葉扇牀前苔爛筍皮鞋分明記得談空日不向秋風更愴懷亂後出山逢高員外自從亂後别京關一入煙蘿十五年重出故山生白髮却裝新卷謁清賢窗回旅夢城頭角栁結鄉愁雨後蟬名姓暗投心暗祝永期收拾向門前贈友人罷舉赴交趾辟命罷却名場擬入秦南行無罪似流人縱經商嶺非馳驛須過長沙弔逐臣舶載海奴鐶硾耳象駝蠻女綵纒身如何待取丹霄桂别赴嘉招作上賓山中寡婦夫因兵死守蓬茅麻苧衣衫鬢髮焦桑柘廢來猶納稅田園荒後尚徵苗時挑野菜和根煮旋斫生柴帶葉燒任是深山更深處也應無計避征徭訪蔡融因題杖藜時復過荒郊來到君家不忍拋每見苦心修好事未嘗開口怨平交一溪寒色漁收網半樹斜陽鳥傍巢必若天工主人事肯交吾子委衡茅間居書事竹門茅屋帶村居數畝生涯自有餘鬢白秖應秋鍊句眼昏多為夜抄書鴈驚風浦漁燈動猿叫霜林橡實疏待得功成即西去時清不問命何如友人贈舍弟依韻戲和吾家此弟有何知多愧君開道業基不覺裹頭成大漢昨來竹馬作童兒還緣世遇兵戈鬧秖恐身修禮樂遲及見和詩詩自好碢公不到一作倒更何時亂後逢村叟經亂衰翁居破村村中何事不傷魂因供寨木無桑柘為著鄉兵絶子孫還似平寧徵賦稅未嘗州縣略安存至於雞犬皆星散日落前山獨倚門贈元上人多少僧中僧行高偈成流落遍僧抄經窗月靜灘聲到石徑人稀蘚色交垂露竹粘蟬落殼窣雲松載鶴棲巢煮茶童子間勝我猶得依時把磬敲下第東歸道中作一回落第一寧親多是途中過却春心火不銷雙鬢雪眼泉難濯滿衣塵苦吟風月唯添病遍識公卿未免貧馬壯金多有官者榮歸却笑讀書人夏日留題張山人林亭此中偏稱夏中遊時有風來暑氣收澗底松搖千尺雨庭中竹撼一窗秋求猿句寄山深寺乞鶴書傳海畔洲間與先生話身事浮名薄宦總悠悠傷病馬此馬堪憐力壯時細勻行步恐塵知騎來未省將鞭觸病後長教覔藥醫顧主強擡和淚眼就人輕刷帶瘡皮秖今筋骨渾全在春暖莎青放未遲館舍秋夕寒雨蕭蕭燈焰青燈前孤客難為情兵戈鬧日别鄉國鴻鴈過時思弟兄冷極睡無離枕夢苦多吟有徹雲聲出門便作還家計直至如今計未成送僧赴黃山沐湯泉參禪宗長老聞有湯泉獨去尋一缶一鉢一無金不愁亂世兵相害却喜寒山路入深野老禱神鴉噪廟獵人衝雪鹿驚林患身是幻逢禪主水洗皮膚語洗心哭山友十載同棲廬嶽雲寒燒枯葉夜論文在生未識公卿面至死不離麋鹿羣從見蓬蒿叢壞屋長憂雨雪透荒墳把君詩句高聲讀想得天高也合聞獻池州牧池陽今日似漁陽大變凶年作小康江路靜來通客貨郡城安後絶戎裝分開野色收新麥驚斷鶯聲摘嫩桑縱有逋民歸未得逺聞仁政旋還鄉送韋書記歸京座主侍郎同舉韋杜相逢眼自明事連恩地倍牽情聞歸帝里愁攀送知到師門話姓名朝客半修前輩禮古人多重晚年榮從來有淚非無淚未似今朝淚滿纓獻鄭給事化行邦域二年春樵唱漁歌日日新未降詔書酬善政不知天澤答何人秋登嶽寺雲隨步夜宴江樓月滿身他日朱門恐難掃沙堤新築必無塵贈休禪和為僧難得不為僧僧戒僧儀未是能弟子自知心了了吾師應為醉騰騰多生覺悟非關衲一點分明不在燈秖道詩人無佛性長將二雅入三乘送李先輩從知塞上去草軍書出帝鄉便從城外學戎裝好隨漢將收胡土莫遣胡兵近漢疆灑磧雪粘旗力重凍河風揭角聲長此行也是男兒事莫向征人恃桂香和友人送弟君説無家秖弟兄此中言别若為情干戈鬧日分頭去山水寒時信路行月下斷猿空有影雪中孤鴈却無聲我今骨肉雖飢凍幸喜團圓過亂兵酬張員外見寄分應天與吟詩老如此兵戈不廢詩生在世間人不識死於泉下鬼應知啼花蜀鳥春同苦叫雪巴猿晝共飢今日逢君惜分手一枝何校一年遲獻新安于尚書九土雄師竟若何未如良牧與天和月留清俸資家少歲計隂功及物多四野緑雲籠稼穡千山明月靜干戈行人耳滿新安事盡是無愁父老歌亂後書事寄一作呈同志九土如今盡用兵短戈長戟困書生思量在世頭堪白畫度歸山計未成皇澤正霑新將士侯門不是舊公卿到頭詩卷須藏却各向漁樵混姓名中山臨上人院觀牡丹寄諸從事間來吟繞牡丹叢花艷人生事略同半雨半風三月內多愁多病百年中開當韶景何多好落向僧家即是空一境别無唯此有忍教醒坐對支公投宣諭張侍郎亂後遇毗陵此生今日似前生重著麻衣特地行經亂後囊新卷軸出山來見舊公卿雨籠蛬壁吟燈影風觸蟬枝噪浪聲聞道中興重人物不妨西去馬蹄輕下第投所知落第愁生曉鼓初地寒才薄欲何如不辭更寫公卿卷却是難修骨肉書御苑早鶯啼暖樹釣鄉春水浸貧居擬離門館東歸去又恐重來事轉疏哭方干何言寸祿不沾身身沒詩名萬古存況有數篇關教化得無餘慶及兒孫漁樵共壘墳三尺猿鶴同棲月一村天下未寧吾道喪更誰將酒酹吟魂秋日泊浦江一帆程歇九秋時漠漠蘆花拂浪飛寒浦更無船並宿暮山時見鳥雙歸照雲烽火驚離抱剪葉風霜逼暑衣江月漸明汀露濕靜驅吟魄入玄微白髮吟一莖兩莖初似絲不妨驚度少年時幾人亂世得及此今我滿頭何足悲九轉靈丹那勝酒五音清樂未如詩家山蒼翠萬餘尺藜杖楮冠輸老兒下第寄池州鄭員外省出蓬蒿修謁初蒙知曾不見生疏侯門數處將書薦帝里經年借宅居未必有詩堪諷誦秖憐無援過吹噓如今足得成持取莫使江湖却釣魚塞上旌旗鬛鬛漢將軍間出巡邊帝命新沙塞旋收饒帳幕犬戎時殺少煙塵冰河夜渡偷來馬雪嶺時分獵去人獨作書生疑不穩軟弓輕劒也隨身贈題兜率寺間上人院人間寺應諸天號真行僧禪此寺中百歲有涯頭上雪萬般無染耳邊風挂帆波浪驚心白上馬塵埃翳眼紅畢竟浮生謾勞役算來何事不成空别四明鍾尚書九華天際碧嵯峨無奈春來入夢何難與英雄論教化却思猿鳥共煙蘿風前栁態間時少雨後花容淡處多都大人生有離别且將詩句代離歌題護國大師塔莫認雙林是佛林禪棲無地亦無金塔前盡禮灰來相衲下誰宗印了心笠象胤明雙不見線源分派寸難尋吾師覺路余知處大藏經門一夜吟春日山中對雪有作竹樹無聲或有聲霏霏漠漠散還凝嶺梅謝後重粧蘂巖水鋪來却結冰牢繫鹿兒防獵客滿添茶鼎侯吟僧好將膏雨同功力松徑莓苔又一層山中對雪有作一渾乾坤萬象收唯應不壅大江流虎狼遇獵難藏迹松柏因風易舉頭玉帳英雄攜妓賞山村鳥雀共民愁豈堪久蔽蒼蒼色須放三光照九州戲題王處士書齋先生高興似樵漁水鳥山猿一處居石徑可行苔色厚釣竿時斫竹叢疏欺春秖愛和醅酒諱老猶看夾注書莫道無金空有壽有金無壽欲何如早發東窗未明塵夢蘇呼童結束登征途落葉鋪霜馬蹄滑寒猿嘯月人心孤時逆帽簷風刮頂旋呵鞭手凍粘鬚青雲快活一未見爭得安間釣五湖題仇處士郊居江南景簇此林亭手板藍裾自可輕洞裏客來無俗話郭中人到有公情間敲巖果呼猿接時釣溪魚引鶴爭笑我有詩三百首馬蹄紅日急於名依韻次同年張曙先輩見寄之什天上詩名天下傳引來齊列玉皇前大仙録後頭無雪至藥成來竈絶煙笑躡紫雲金作闕夢拋塵世鐵為船九華山叟驚凡骨同到蓬萊豈偶然亂後逢李昭象敘别李生李生何所之家山窣雲胡不歸兵戈到處弄性命禮樂向人生是非却與野猿同橡塢還將溪鳥共漁磯也知不是男兒事爭奈時情賤布衣晚春寄同年張曙先輩莫將時態破天真秖合高歌醉過春易落好花三個月難留浮世百年身無金潤屋渾間事有酒扶頭是了人恩地未酬間未得一回醒話一沾巾長安春感出京無計住京難深入東風一作門轉索然滿眼有花寒食下一家無信楚江邊此時晴景愁於雨是處鶯聲苦却蟬公道算來終達去一作了更從今日望明年登靈山水閣貽釣者江上見僧誰是了修齋補衲日勞身未勝漁父間垂釣獨背斜陽不采人縱有風波猶得睡總無蓑笠始為貧瓦瓶盛酒瓷甌酌荻浦蘆灣是要津贈溧水崔少府庭户蕭條燕雀喧日高窗下枕書眠秖聞留客教酤酒未省逢人説料錢洞口禮星披鶴氅溪頭吟月上漁船九華山叟心相許不計官卑贈一篇讀張僕射詩曾應舉不及第投筆領郡秋吟一軸見心胸萬象搜羅詠欲空才大却嫌天上桂世危翻立陳前功亷頗解武文無説謝眺能文武不通雙美總輸張太守二南章句六鈞弓題所居村舍家隨兵盡屋空存稅額寧容減一分衣食旋營猶可過賦輸長急不堪聞蠶無夏織桑充寨田廢春耕犢勞軍如此數州誰會得殺民將盡更邀勳獻錢塘縣羅著作判官還鄉夫子遇賢侯撫字情知不自由莫把一名專懊惱放教雙眼絶寃讎猩袍懶著辭公宴鶴氅間披訪道流猶有九華知已在羡君高卧早回頭遣懷驅馳歧路共營營秖為人間利與名紅杏園中終擬醉白雲山下懶歸耕題橋每念相如志佩印當期季子榮謾道強親堪倚賴到頭須是有前程長安道中有作回頭不忍看羸僮一路行人我最窮馬迹蹇於槐影裏釣船拋在月明中帽簷曉滴淋蟬露衫袖時飄卷鴈風子細尋思底模樣騰騰又過玉關東題開元寺門閣一登高閣眺清秋滿目風光盡勝遊何處畫橈尋緑水幾家鳴笛咽紅樓雲山巳老一作降應長在歲月如波秖暗遊唯有禪居離塵俗了無榮辱挂心頭出關投孫侍御東歸還著舊麻衣爭免花前有淚垂每歲春光九十日一生年少幾多時青雲寸祿心耕早明月仙枝分種遲不為感恩酬未得五湖間作釣魚師送項山人歸天台因話天台歸思生布囊藤杖笑離城不教日月拘身事自與煙蘿結野情龍鎮古潭雲色黑露淋秋檜鶴聲清此中是處堪終隱何要世人知姓名題衡陽隱士山居間居不問世如何雲起山門日巳斜放鶴去尋三島客任人來看四時花松醪臘醖安神酒布水宵煎覔句茶畢竟金多也頭白算來爭得似君家題江寺禪和江寺禪僧似悟禪壞衣芒履住茅軒懶求施主修真像翻説經文是妄言出浦釣船驚宿鴈伐巖樵斧迸寒猿行人莫問師宗旨眼不浮華耳不喧題弟姪書堂何事居窮道不窮亂時還與靜時同家山雖在干戈地弟姪常修禮樂風窗竹影搖書案上野泉聲入硯池中少年辛苦終身事莫向光隂惰寸功和友人寄長林孟明府為政為人漸見心長才聊屈宰長林莫嫌月入無多俸須喜秋來不廢吟寒雨旋疏叢菊艷晚風時動小松隂訟庭間寂公書少留客看山索酒斟戲贈漁家見君生計羡君間求食求衣有底難養一箔蠶供釣線種千莖竹作漁竿胡蘆杓酌春濃酒舴艋舟流夜漲灘却笑儂家最辛苦聽蟬鞭馬入長安登城有作上得孤城向晚春眼前何事不傷神遍看原上纍纍冢曾是城中汲汲人盡謂黃金堪潤屋誰思荒骨旋成塵一名一宦平生事不放愁侵易過身秋日山中寄池州李常侍近來參謁陡生疏因向雲山僻處居出為羇孤營糲食歸同弟姪讀生書風凋古木秋隂薄月滿寒山夜景虛但得中興知已在算應身未老樵漁辭楊侍郎春在門闌秋未離不因人薦只因詩半年賓館成前事一日侯門失舊知霜島樹雕猿叫夜湖田穀熟鴈來時西風萬里東歸去更把愁心説向誰題汪氏茅亭茅亭客到多稱竒茅亭之上難題詩出塵景物不可狀小手篇章徒爾為牛畔稻苗新雨後鶴邊松韻晚風時君今酷愛人間事爭得安間老在兹喜從弟雪中逺至有作深山大雪懶開門門徑行蹤自爾新無酒禦寒雖寡況有書供讀且資身便均情愛同諸弟莫更生疏似外人晝短夜長須強學學成貧亦勝他貧送僧歸國清寺吟送越僧歸海涯僧行渾不覺程賒路沿山腳潮痕出睡倚松根日色斜撼錫度岡猿抱樹挈瓶盛浪鷺翹沙到參禪後知無事看引秋泉灌藕花題汪明府山居不似當官秖似間野情終日不離山方知薄宦難拘束多與高人作往還牛笛慢吹煙雨裏稻苗平入水雲間羡君公退歸攲枕免向他門厚客顔下第東歸將及故園有作平生操立有天知何事謀身與志違上國獻詩還不遇故園經亂又空歸山城欲暮人煙斂江月初寒釣艇歸且把風寒作間事懶能和淚拜庭闈宿東林寺題願公院古寺沈沈僧未眠搘頤將客説間緣一溪月色非塵世滿洞松聲似雨天簷底水涵抄律燭窗間風引煮茶煙無由住得吟相伴心繫青雲十五年山居自遣茅屋周回松竹隂山翁時挈酒相尋無人開口不言利只一作獨我白頭空愛吟月在釣潭秋睡重雲橫樵徑野情深此中一日過一日有底間愁得到心贈友人罷舉赴辟命連天一水浸吳東十幅帆飛二月風好景採拋詩句裏别愁驅入酒杯中漁依岸栁眠圓影鳥傍嵒花戲暖紅不是桂枝終不得自緣年少好從戎亂後旅中遇友人念子為儒道未亨依依心向十年兄莫因亂世輕依託須學前賢隱姓名大國未知何日靜舊山猶可入雲耕不如自此同歸去帆挂秋風一信程贈休糧僧自言因病學休糧本意非求不死方徒有至人傳道術更無齋客到禪房雨中林鳥歸巢晚霜後嵒猿拾橡忙爭似吾師無一事穩披雲衲坐藤床維揚春日再遇孫侍御本為榮家不為身讀書誰料轉家貧三年行却千山路兩地思歸一主人絡岸栁絲懸細雨繡田花朵弄殘春多情御史應嗟見未上一作到青雲白髮新亂後宿南陵廢寺寄沈明府秖共寒燈坐到明塞鴻衝雪一聲聲亂時為客無人識廢寺吟詩有鬼驚且把酒杯添志氣巳將身事託公卿男兒仗劒酬恩在未肯徒然過一生投鄭先輩匣中長劒未酬恩不遇男兒不合論悶向酒杯吞日月間將詩句問乾坤寧辭馬足勞關路肻為漁竿憶水村兩鬢欲斑三百首更教裝寫傍誰門途中有作無論南北與西東名利牽人處處同枕上事仍多馬上山中心更甚關中川原晚結隂沈氣草樹秋生索漠風百歲此身如且健大家間作卧雲翁和舍弟題書堂兄弟將知大自強亂時同葺讀書堂嵒泉遇雨多還鬧溪竹唯風少即涼藉草醉吟花片落傍山間步藥苗香團圓後是家肥事何必盈倉與滿箱送蜀客遊維揚見説西川物景繁維揚景物勝西川青春花栁樹臨水白日綺羅人上船夾岸畫樓難惜醉數橋明月不教眠送君懶問君回日才子風流正少年旅寓暗算鄉程隔數州欲歸無計淚空流巳違骨肉來時約更束琴書何處遊畫角引風吹斷夢垂楊和雨結成愁去年今日還如此似與青春有舊讎途中春年光身事旋成空畢竟何門遇至公人世鶴歸雙鬢上客程蛇繞亂山中牧童向日眠春草漁父隈巖避晚風一醉未醒花又落故鄉回首楚關東維揚冬末寄幕中二從事江上數株桑棗樹自從離亂更荒涼那堪旅館經殘臘秖把空書寄故鄉典盡客衣三尺雪鍊精詩句一頭霜故人多在芙蓉幕應笑孜孜道未光辭鄭員外入關男兒三十尚蹉跎未遂青雲一桂科在客易為銷歲月到家難住似經過帆飛楚國風濤濶馬渡藍關雨雪多長把行藏信天道不知天道竟如何書齋即事時清秖合力為儒不可家貧與善疏賣却屋邊三畝地添成窗下一床書沿溪摘果霜晴後出竹吟詩月上初鄉里老農多見笑不知稽古勝耕鋤雋陽語道中客路客路何悠悠蟬聲向背槐花愁爭知百歲不百歲未合白頭今白頭四五朵山粧雨色兩三行鴈帖雲秋輸他江上垂綸者秖在船中老便休入關因别舍弟吾今别汝汝聽言去住人情足可安百口度荒均食易數年經亂保家難莫愁寒族無人薦但願春官把卷看天道不欺心意是帝鄉吾土一般般贈彭蠡釣者偏坐漁舟出葦林葦花零落向秋深秖將波上漚為侣不把人間事繫心傍岸歌來風欲起卷絲眠去月初沈若教我似君間放贏得湖山到老吟送友人入關此去青雲莫更疑出人才行足人知況當朝野搜賢日正是孤寒取事時仙島煙霞通鶴信早春雷雨與龍期我今不得同君去兩鬢霜欺桂一枝送友人宰潯陽高興那言去路長非君不解愛潯陽有時猿鳥來公署到處煙霞是道鄉釣艇滿江魚賤菜紙窑連嶽楮多桑陶潛舊隱依稀在好繼高蹤結草堂秋日卧病浮世浮名能幾何致身流落向天涯少年心壯輕為客一日病來思在家山頂老猿啼古木渡頭新鴈下平沙不堪吟罷西風起黃葉滿庭寒日斜敘吟多慚到處有詩名轉覺吟詩僻性成度水却嫌船著岸過山翻恨馬貪程如讎雪月年年景似夢笙歌處處聲未合白頭今巳白自知非為别愁生行次榮陽却寄諸弟難把歸書説逺情奉親多闕拙為兄早知寸祿榮家晚悔不深山共汝耕枕上算程關月落帽前搜景嶽雲生如今巳作長安計秖得辛勤取一名登石壁禪師水閣有作石壁早聞僧説好今來偏與我相宜有山有水堪吟處無雨無風見景時漁父晚船分浦釣牧童寒笛倚牛吹畫人畫得從他畫六幅應輸八句詩贈袒肩和尚山衣草屐染莓苔雙眼猶慵向俗開若比吾師居世上何如野客卧嵒隈才聞錫杖離三楚又説隨緣向五臺乘醉吟詩問禪理為誰須去為誰來間居即事形覺清羸道覺肥竹門前徑靜相宜一壺村酒無求處數朵庭花見落時章句偶為前輩許話言多被俗人疑一枝仙桂如攀得秖此山前是老期自敘酒甕琴書伴病身熟諳時事樂於貧寧為宇宙間吟客怕作乾坤竊祿人詩旨未能忘救物世情奈值不容真平生肺腑無言處白髮吾唐一逸人空間二公遞以禪律相鄙因而解之一教誰云闢二途律禪禪律智歸愚念珠在手隳禪衲禪衲披肩壞念珠象外空分空外象無中有作有中無有無無有師窮取山到平來海亦枯寄溫州朱尚書并呈軍倅崔太博永嘉名郡昔推名連屬荀家弟與兄教化靜師龔渤海篇章高體謝宣城山從海岸粧吟景水自城根演政聲今日老輸崔博士不妨疏逸伴雙旌恩門致書逺及山居因獻之時難轉覺保身難難向師門欲繼顔若把白衣輕易脫却成青桂偶然攀身居劒戟爭雄地道在乾坤未喪間必許酬恩酬未晚且須容到九華山寄溫州崔博士懷君勞我寫詩情窣窣隂風有鬼聽縣宰不仁工部餓酒家無識翰林醒眼昏經史天何在心盡英雄國未寧好向賢侯話吟侶莫教辜負少微星李昭象云與二三同人見訪有寄得君書後病顔開云拉同人訪我來在路不妨衝雨雪到山還免踏塵埃吟沈水閣何宵月坐破松巖幾處苔貧舍款賓無别物止於空戰大尊罍和友人見題山居水閣八韻池閣初成眼豁開眼前霽景屬微才試攀簷果猿先見才把漁竿鶴即來修竹巳多猶可種艷花雖少不勞栽南昌一榻延徐孺楚國千鍾逼老萊未稱執鞭奔紫陌惟宜策杖步蒼苔籠禽豈是摩霄翼潤木元非澗下材鑒巳每將天作鏡陶情常以海為杯和君詩句吟聲大蟲豸聞之謂蟄雷唐風集卷二
