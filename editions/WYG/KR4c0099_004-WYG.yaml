body:
  text: 唐風集跋杜荀鶴池州人紀事云牧之微子也會昌末牧之自齊安移守秌浦時妾有姙出嫁長林鄕杜筠而生荀鶴自號九華山人少有詩名年四十六始擢第殷文圭賀詩云一戰平酬五字勞晝歸鄉去錦為袍大鵬出海翎猶濕駿馬辭天氣正豪九子舊山增秀絶二南新格變風騷可謂叙述曲盡矣與楊䕫康軿夏候淑王希羽殷文圭皆為淮南將田頵上客及頵遇禍梁太祖表授翰林學士主客員外郎知制誥天祐初卒顧雲詩叙極其推重或又病其詩近俗惟宫詞為第一諺云杜詩三百首惟在一聯中正謂風煖鳥聲碎日高花影重也唐風集以之壓巻亦此意耶琹川毛晉識
