body:
  text: 唐風集别集類一唐提要臣等謹按唐風集三卷唐杜荀鶴撰荀鶴池州人按計有功唐詩紀事稱荀鶴有詩名大順初擢進士第二牧之微子也牧之自齊安移守秋浦時有妾懷妊出嫁長林鄉杜筠而生荀鶴又稱荀鶴擢第時危勢晏復還舊山田頵在宣州甚重之頵起兵陰令以箋間至梁太祖許及頵遇禍梁主表授翰林學士主客員外郎中知制誥恃勢侮易縉紳衆怒欲殺之未及天祐初卒又稱荀鶴初謁梁王朱全忠雨作而天無雲荀鶴賦詩有若教隂翳都相似爭表梁王造化功句是荀鶴為人至不足道其稱杜牧之子殆亦梁師成之依托蘇軾乎其詩最有名者為風暖鳥聲碎日髙花影重一聫而歐陽修六一詩話以為周朴詩吳聿觀林詩話亦稱見唐人小説作朴詩荀鶴特竊以壓卷然則此一聫者又如寶月之于柴廓矣此集乃其初登第時所自編詩多俗調不稱其名以唐人舊集流傳巳久姑存以備一家毛晉刻本前有顧雲序序末謂之唐風集以下文不相屬蓋舊本唐詩紀事載雲此序誤連下條荀鶴初謁梁王云云六十四字為一條晉不察而誤併抄之殊為疏舛今刋除此假以還其舊焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀唐風集敘大順初皇帝命小宗伯河東裴公掌邦貢次二年逺者來隱者出異人雋士大集都下於羣進士中得九華山人杜荀鶴拔居上第諸生謝恩日列坐既定公揖生謂曰聖上歉文教未張思得如高宗朝射洪拾遺陳公名犯文宗廟諱作詩出沒二雅馳驟建安削苦澀僻碎略淫靡淺切破艷冶之堅陳擒雕巧之酋帥皆摧橦折角崩潰解散掃蕩詞場豁清文祲然後有戴容州劉隨州王江寧率其徒揚鞭按轡相與呵樂來朝于正道矣以生詩有陳體可以潤國風廣王澤故擢以塞詔竟免為中興詩宗生謝而退明年寧親江表以僕故山偕隱者出詩三百篇見其雅麗激越之句能使貪吏亷邪臣正父慈子孝兄友弟悌人倫之紀備矣其壯語大言則決起逸發可以左攬工部袂右拍翰林肩吞賈喻八九于胸中曾不蠆介情動於中則極思𡨕搜神遊希夷形兀枯木五聲勞於呼吸萬象貧于抉剔信詩之雄傑者也美哉裴公之知人為不誣矣於戲旌别淑慝史臣之職僕幸得為之敘録視其人齒尚壯才力未盡謳吟之興方酣俟其繼作得如周頌者目之為唐風集顧雲序
