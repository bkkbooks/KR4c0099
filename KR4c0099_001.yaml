body:
  text: 唐風集卷一唐杜荀鶴撰今體五言凡一百二十六首春宫怨早被嬋娟誤欲粧臨鏡慵承恩不在貌教妾若為容風暖鳥聲碎日高花影重年年越溪女相憶採芙蓉訪道者不遇寂寂白雲門尋真不遇真祇應松上鶴便是洞中人藥圃花香異沙泉鹿跡新題詩留姓字他日此相親送人遊吳君到姑蘇見人家盡枕河古宫閒地少水港小橋多夜市賣菱藕春船載綺羅遙知未眠月鄉思在漁歌送陳昈歸麻川麻川清見底似入武陵溪兩岸山相向三春鳥亂啼酒旗和栁動僧屋與雲齊即此吾鄉路懷君夢不迷出山病眼看春榜文場公道開朋人登第盡白髮出山來處世曾無過惟天合是媒長安不覺逺期遂一名回浙中逢詩友到處有同人多為賦與文詩中難得友湖畔喜逢君凍把城根雪風開嶽面雲苦吟吟不足爭忍話離羣送友遊吳越去越從吳過吳疆與越連有園多種橘無水不生蓮夜市橋邊火春風寺外船此中偏重客君去必經年出常山界使回有寄自小即南北未如今日離封疆初盡處人使却回時開口有所忌此心無以為行行復垂淚不稱是男兒經廢宅人生當貴盛修德可延之不慮有今日爭教無破時蘚斑題字壁花發帶巢枝何況蒿原上荒墳與折碑登天台寺一到天台寺高低景旋生共僧巖上坐見客海邊行野色人耕破山根浪打鳴忙時向閒處不覺有閒情途中春馬上覽春色丈夫慙淚垂一生看老却五字未逢知酒力不能久愁根無可醫明年到今日公道與誰期入關歷陽道中却寄舍弟求名日苦辛日望日榮親落葉山中路秋霖馬上人晨昏知汝道詩酒衛吾身自笑拋麋鹿長安擬醉春贈歐陽明府賢宰宰斯邑政聞閭里間都緣民訟少長覺吏徒閒帆落樽前浦鍾鳴枕上山回舟却惆悵數宿釣魚灣贈臨上人不計禪兼律終須入悟門解空非有自所得是無言眼豁浮生夢心澄大道源今來習師者多鎖教中猿題戰島僧居在江之心師愛無塵地江心島上居接船求化慣登陸赴齊疏載土春栽樹拋生日餧魚入雲蕭帝寺畢竟欲何如别衡州牧朝别使君門暮投江上村從來無舊分臨去望何恩行計自不定此心誰與論秋猿叫寒月祇欲斷人魂送人遊江南滿酌勸君酒勸君君莫辭能禁幾度别即到白頭時晚岫無雲蔽春帆有燕隨男兒兩行淚不欲等閒垂遊茅山步步入山門仙家鳥徑分漁樵不到處麋鹿自成羣石面迸出水松頭穿破雲道人星月下相次禮茅君讀友人詩卷冰齒味瑶軸祇應神鬼知坐當羣靜後吟到月沈時雪峽猿聲健風柳鶴立危篇篇一字字誰復更言詩寄從叔三族不當路長年猶布衣苦吟天與性直道世將非雁夜愁癡坐漁鄉老憶歸為儒皆可立自是拙時機寄李溥如我如君者不妨身晚成但從時輩笑自得古人情共莫更初志俱期立後名男兒且如此何用嘆平生郊居即事投李給事無祿奉晨昏閒居幾度春江湖苦吟士天地最窮人書劍同三友蓬蒿外四鄰相知不相薦何以自謀身寄詩友别來春又春相憶喜相親與我為同志如君能幾人何時吟得力漸老事關身惟有前溪水年年濯客塵題田家翁田翁真快活婚嫁不離村州縣供輸罷追隨鼓笛喧盤飱同老少家計共田園自說身無事應官有子孫長安冬日近臘饒風雪閒房凍坐時書生教到此天意轉難知吟苦猿三叫形枯柏一枝還應公道在未忍與山期霽後登唐興寺水閣一雨三秋色蕭條古寺間無端登水閣有處似家山白日生新事何時得暫閒將知老僧意未必戀松關山中寄友人深山多隙地無力及耕桑不是營生拙都緣覔句忙破窗嵐翳燭穿屋月侵床吾友應相笑辛勤道未光自述四海欲行遍不知終遇誰用心常合道出語或傷時擬作閒人老慙無識者嗤如今巳無計祇得苦于詩題江山寺江上山頭寺景留吟客船遍遊銷一日重到是何年沙鳥多翹足巖僧半露肩為詩多語澀喜此得終篇秋日旅舍卧病呈所知秋色上庭枝愁懷切向誰青雲無勢日華髮有狂時枕上聞風雨江南繫别離如何吟到此此道不聞知秋宿山館山館坐待曉夜長吟役神斜風吹敗葉寒燭照愁人藴蓄天然性澆訛世惡真男兒出門志不獨為謀身贈老僧衆僧尊夏臘靈嶽遍曾登度水手中杖行山溪畔藤心空默是印眉白雪為稜自得巡方道棲禪老未能别舍弟欲住住不得出門天氣秋惟知偷拭淚不忍更回頭此日祇愁老況身方逺遊孤寒將五字何以動諸侯雪中别詩友酒寒無小户請滿酌行杯若待雪消去自然春到來出城人跡少向暮鳥聲哀未遇應關命侯門處處開題嶽麓寺一簇楚江山江山勝此難覔人來畫取到處得吟看鶴隱松聲盡魚沈檻影寒自知心未了閒話亦多端懷廬嶽書齊長憶在廬嶽免低塵土顔煮茶窗底水採藥屋頭山是境皆遊遍誰人不羡閒無何一名繫引出白雲間題唐興寺小松雖小天然别難將衆木同侵僧半窗月向客滿一作一襟風枝拂行苔鶴聲分叫砌蟲如今未堪看須是雪霜中與友人話别客路行多少干人無易顔未成終老計難致此身閒月兔走入海日烏飛出山流年留不得半在别離間贈廬嶽隱者自見來如此未嘗離洞門結茅遮雨雪採藥給晨昏古樹藤纒殺春泉鹿過渾悠悠無一事不似屬乾坤懷紫閣隱者紫閣白雲端雲中有地仙未歸蓬島上猶隱國門前洞口人無跡花隂鹿自眠焚香賦詩罷星月冷遙天題會上人院鼓角城中寺師居日得閒心能行大道何用在深山破衲新添線空門夜不關心知與眼見終取到無間送黃補闕南遷得罪非天意分明謫去身一心貪諫主開口不防人自古有遷客何朝無直臣喧然公論在難滯楚南雲送賔貢登第後歸海東歸捷中華第登船鬢未絲直應天上桂别有海東枝國界波窮處鄉心日出時西風送君去莫慮到家遲近試投所知白髮隨梳落吟懷說向誰敢辭成事晚自是出山遲擬動如浮海凡言似課詩終一作修身事知已此外復何為送友人牧江州本國兵戈後難官在此時逺分天子命深要使君知但遂生靈願當應雨露隨江山勝他郡閒賦庾樓詩辭座主侍郎一飯尚懷感況攀高桂枝此恩無報處故國逺歸時祇恐兵戈隔再趨門館遲茅堂拜親後特地淚雙垂别從叔立馬不忍上醉醒天氣寒都緣在門易直似别家難世路既如此客心須自寬江村亦飢凍爭及問長安送人南遊凡遊南國者未有不蹉跎到海路難盡挂帆人更多潮沙分象跡花洞響蠻歌縱有投文處於君能幾何經賈島墓謫宦自麻衣銜寃至死時山根三尺墓人口數聯詩仙桂終無分皇天似有私暗松風雨夜空使老猿悲秋夜晚泊一望一蒼然蕭騷起暮天逺山橫落日歸鳥度平川家是去秋别月當今夕圓漁翁似相伴徹曉葦叢邊送舍弟我受羇棲慣客情方細知好看前路事不比在家時勉汝言須記聞人善即師旅中無廢業時作一篇詩將歸山逢友人儒為君子儒儒道不妨孤白髮多生矣青山可住乎徉狂寧是事巧達又非夫祇此平生願他人肻信無經九華費徵君墓凡弔先生者多傷荆棘間不知三尺墓高却九華山天地有何外子孫無亦閒當時若徵起未必得身還溪居叟溪翁居靜處溪鳥入門飛早起釣魚去夜深乘月歸見君無事老覺我有求非不說風霜苦三冬一草衣與友人對酒吟憑君滿酌酒聽我醉中吟客路如天逺侯門似海深新墳侵古道白髮戀黃金共有人間事須懷濟物心送僧道了亦未了言閒今且閒從來無住處此去向何山片石樹隂下斜陽潭影間請師留偈别恐不到人寰送九華道士遊茅山忽起他山興飄然出舊山於身無切事在世有餘閒日月浮生外乾坤大醉間故園華表上誰得見君還寄舍弟世亂信難通鄉心日萬重弟兄皆嚮善天地合相容大野隂雲重連城殺氣濃家山白雲裏卧得最高峯下第投所知若以名場內誰無一軸詩縱饒生白髮豈敢怨明時知已雖然切春官未必私寧教讀書眼不有看花期寄顧雲省得前年别蘋洲旅館中亂離身不定彼此信難通侯國兵雖斂吾鄉業巳空秋來憶君夢夜夜逐征鴻贈宣城麋明府天下為官者無君一軸詩數聯同我得當代遇誰知年齒吟將老生涯說可悲何當拋手板鄰隱過危時望逺門前通大道望逺上高臺落日人行盡一作逝窮邊信不來還聞戰得勝未見敕招回却入機中坐新愁織不開冬末投長沙裴侍郎欲露塵中事其如不易言家山一離别草樹匝春暄吹夢風天角啼愁雪嶽猿佇思心覺滿何以逺門軒贈秋浦金明府長倚郭難為宰非君即有私惟憑野老口不立政聲碑苦甚求名日貧於未選時溪山竟如此利得且吟詩和高祕書早春對雪登樓見寄之什天有惜花意恐花開染塵先教微雪下始放滿城春且醉登樓客重期出郭人因酬郢中律一作作霜鬢數莖新亂後山中作自從天下亂日晚别庭闈兄弟團圞樂羇孤逺近歸文章甘世薄耕種喜山一作田肥直待中興後方應出隱扉旅寓書事日日驚身事悽悽欲斷魂時清不自立髮白傍誰門中路殘秋雨空山一夜猿公卿得見面懷抱細難言舟行晚泊江上寺久勞風水一作雨上禪客喜相依挂衲雖無分修心未覺非日沈山虎出鍾動寺禽歸月上潮平後談空一作𤣥漸入微長林山中聞賊退寄孟明府一縣今如此殘民數不多也知賢宰切爭奈亂兵何皆自干戈達咸思雨露和應憐住山者頭白未登科泗上客思痛飲復高歌愁終不奈何家山隨日逺身事逐年多沒鴈雲橫楚兼蟬栁夾河此心閒未得到處被詩磨寄同人盡與貧為患唯余即不然四方無靜處百口度荒年白髮生閒事新詩出數聯時情竟如此不免却歸田下第出關投鄭拾遺丹霄桂有枝未折未為遲況是孤寒士兼行苦澀詩杏園人醉日關路獨歸時更卜深知意將來擬薦誰塞上草白河冰合蕃戎出掠頻戍樓三急號探馬一條塵戰士風霜苦將軍雨露新封侯不由此何以慰征人别敬侍郎交道有寒暑在人無古今與君中夜話盡我一生心所向未得志豈惟空解吟何當重相見舊隱白雲深送青陽李明府善政無慚色吟歸似等閒惟將六幅絹寫得九華山求理空頭白離京債未還仍聞猿與鶴都在一船間將遊湘湖有作一家相别意不得不澘然逺作南方客初登上水船嶽鍾思冷夢湘月少殘篇便有歸來計風波亦隔年送姚庭圭脫衣將換酒對酌話何之雨後秋蕭索天涯晚别離人生無此恨鬢色不成絲未得重相見看君馬上詩投李大夫自小僻於詩篇篇恨不竒苦吟無暇日華髮有多時進取門難見升沈命未知秋風夜來急還恐到京遲貽里中同志鄉里為儒者唯君見我心詩書常共讀雨雪亦相尋貧賤志氣在子孫交契深古人猶晚達況未鬢霜侵江上送韋彖先輩不易為離抱江天即見鴻暮帆何處落涼月與誰同木葉新霜後漁燈夜浪中時難慎行止吾道利于窮維揚逢詩友張喬天下方多事逢君得話詩直應吾道在未覺國風衰生計吟銷日人情醉過時雅篇三百首留作後來師秋晨有感木葉落時節旅人初夢驚鍾才枕上盡事已眼前生吟髮不長黑世交無久情且將公道約未忍便歸耕秋日山中寄李處士吾輩道何窮寒山細雨中兒童書懶讀果栗樹將空言論關時務篇章見國風升平猶可用應不廢為公一作翁晚泊金陵水亭江亭當廢國秋景倍蕭騷夕照殘荒壘寒潮漲古濠就田看鶴劣一作大隔水見僧高無限前朝事醒吟易覺勞錢塘别羅隱故國看看逺前程計在誰五更聽角後一葉渡江時吾道天寧喪人情日可疑西陵向西望雙淚為君垂山中貽同志君貧我亦貧為善喜為鄰到老如今日無心愧古人閉門非傲世守道是謀身别有同山者其如未可親秋日懷九華舊居吾道在五字吾身寧陸沈涼生中夜雨一作月病起故山心燭共寒酸影蛩添苦楚吟何當遂歸去一徑入松林江岸秋思驅馬傍江行鄉愁步步生舉鞭揮栁色隨手失蟬聲秋稼緣長道寒雲約古城家貧遇豐歲無地可歸耕哭劉德仁賈島還如此生前不見春豈能詩苦者便是命羈人家事因吟失時情礙國親多應銜恨骨千古不為塵經青山弔李翰林何為先生死先生道日新青山明月夜千古一詩人天地空銷骨聲名不傍身誰移耒陽冢來此作吟鄰下第東歸别友人不得同君住當春别帝鄉年華落第老歧路出關長芳草緣流水殘花向夕陽懷親暫歸去非是釣滄浪秋宿詩僧雲英房因贈賈島憐無可都緣數句詩君雖是後輩我謂過當時溪浪和星動松隂帶鶴移同吟到明坐此道淡誰知送人宰吳縣海漲兵荒後為官合動情字人無異術至論不如清草履隨船賣綾梭隔水鳴唯持古人意千里贈君行讀友人詩君詩通大雅吟覺古風生外却浮華景中含教化情名應高日月道可潤公卿莫以孤寒恥孤寒達更榮登山寺山半一山寺野人秋日登就中偏愛石獨上最高層有果猿攀一作搖樹無齊鴿看僧儒門自多事來此復何能辭九江李郎中入關帝里無相識何門跡可親願開言重口薦與分深人卷許新詩出家憐舊業貧今從九江去應免更迷津江南逢李先輩李杜復李杜彼時逢此時干戈侵帝里流落向天涯歲月銷於酒平生斷在詩懷才不得志祇恐滿頭絲秋日寄吟友閒坐細思量唯吟不可忘食無三畝地衣絶一株桑蟬樹生寒色漁潭落曉光青雲舊知已未許釣滄浪江上與從弟話别相逢盡說歸早晚遂歸期流水多通處孤舟少住時干人不得巳非我欲為之及此終無愧其如道在兹送友人遊南海南海南邊路君遊祇為貧山川多少地郡邑幾何人花鳥名皆别寒暄氣不均相期早晚見莫待瘴侵身贈聶尊師詩道將仙分求之不可求非關從小學應是數生修蟾桂雲梯折鼇山鶴駕遊他年兩成事堪喜是鄰州旅感白髮根叢出鑷頻愁不開自憐空老去誰信苦吟來客路東西濶家山早晚回翻思釣魚處一雨一層苔寄益陽武灌明府縣稱詩人理無嫌日寂寥溪山入城郭戶口半漁樵月滿彈琴夜花香漉酒朝相思不相見煙水路迢迢湘中秋日呈所知四海無寸土一生惟苦吟虛垂異鄉淚不滴别人心雨一作木色凋湘樹灘聲下塞禽求歸歸未得不是擲光隂苦吟世間何事好最好莫過詩一句我自得四方人巳知生應無輟日死是不吟時始擬歸山去林泉道在兹閩中别所知觸目生歸思那堪路七千臘中離此地馬上見明年郡邑溪山巧寒暄日月偏自疑雙鬢雪不似到南天塞上傷戰士戰士說辛勤書生不忍聞三邊逺天子一命信將軍野火燒人骨隂風捲陳雲其如禁城裏何以重要勳春日訪獨孤處士地僻春來靜深宜長者居好花都待一作大晚修竹不妨疏鴈入湘江食人侵曉色鋤似君無學處頭白道如初哭友人病向名場得終為善誤身無兒承後嗣有女托何人葬禮難求備交情好者貧惟餘舊文集一覽一沾巾新栽竹斸破蒼苔色因栽十數莖窗風從此冷詩思當時清酒入杯中影棊添局上聲不同桃與李瀟灑伴書生送吳蛻下第入蜀下第言之蜀那愁舉别杯難兄方在幕上相復憐才鳥徑盤春靄龍湫發夜雷臨卭無久戀高桂待君回亂後題山一作山居亂世題山谷征鼙喜不聞詩書猶滿架弟姪未為軍山犬眠紅葉樵童唱白雲此心非此志終擬致明君題著禪師大道本無幻常情自有魔人皆迷著此師獨悟如何為嶽開窗濶因蟲長草多說空空說得空得到維摩春日閒居即事未得青雲志春同秋日情花開如葉落鶯語似蟬鳴道合和貧守詩堪與命爭飢寒是吾事斷定不歸耕秋宿棲賢寺懷友人一宿三秋寺閒忙與曉分細泉山半落孤客夜深聞鶴去巢盛月龍潜穴擁雲苦吟方見景多恨不同君亂後再逢汪處士如君真道者亂一作高世有閒情每别不知處見來長後生藥非因病服酒不為愁傾笑我於身苦吟髭白數莖山中喜與故交宿話逺地能相訪何慙事力微山中深夜坐海內故交稀村酒沽來濁溪魚釣得肥貧家只如此未可便言歸觀棊對面不相見用心同用兵算人常欲殺顧已自貪生得勢侵吞逺乘危打劫贏有時逢敵手當局到深更送人宰德清亂世人多事耕桑或失時不聞寬賦斂因此轉流離天意未如是君心無自欺能依四十字可立德清碑寄竇處士漳水醉中别今來猶未醒半生因酒廢大國幾時寧海畔將軍栁天邊處士星遊人不可見春入亂山青題歷山舜祠山有廟呼為帝二子多變妖異為時所敬昔舜曾耕地遺風日寂寥世人那肻祭大聖不興妖殿宇秋霖壞杉松野火燒時訛競淫祀絲竹醉山魈贈李䝉叟在我成何事逢君更勸吟縱饒不得力猶勝别勞心凡事有興廢詩名無古今百年能幾日忍不惜光隂維揚冬末寄幕中二從事聞道長溪尉相留一館閒已投三寸管尚隔幾重山為旅春風外懷人夜雨間年來疏覽鏡怕見減朱顔和劉評事送海禪和歸山衲外元無象言尋那路尋問禪將底說傳印得何心未了羣山淺難休一室深伏魔寧是獸巢頂亦非禽觀色風驅霧聽聲雪灑林凡歸是歸處不必指高岑御溝栁此首應在唐興寺小松後律到御溝春溝邊栁色新細籠穿禁水輕拂入朝人日近韶光早天低聖澤勻谷鶯棲未穩宫女畫難真楚國空搖浪隋堤暗惹塵如何帝城裏先得覆龍津唐風集卷一
